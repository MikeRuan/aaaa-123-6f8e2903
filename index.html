<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跳棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: '微软雅黑', Arial, sans-serif;
    color: white;
  }
  h1 { font-size: 2.2em; margin-bottom: 8px; text-shadow: 0 0 20px #f0c040; color: #f0c040; }
  #status {
    font-size: 1.1em; margin-bottom: 8px;
    background: rgba(255,255,255,0.1);
    padding: 8px 20px; border-radius: 20px;
    min-width: 240px; text-align: center;
  }
  #gameContainer { position: relative; display: flex; flex-direction: column; align-items: center; }
  canvas {
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(240,192,64,0.4);
    cursor: pointer; touch-action: none;
  }
  .btn-row { display: flex; gap: 15px; margin-top: 12px; }
  button {
    padding: 10px 25px; font-size: 1em; border: none;
    border-radius: 25px; cursor: pointer; font-weight: bold;
    transition: transform 0.1s;
  }
  button:hover { transform: scale(1.05); }
  #restartBtn { background: linear-gradient(135deg, #f0c040, #e08020); color: #1a1a2e; }
  #diffBtn { background: linear-gradient(135deg, #40c0f0, #2080e0); color: white; }
  #modeLabel { font-size: 0.92em; margin-top: 6px; color: #aaddff; }
  #winOverlay {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10,10,30,0.93);
    border: 3px solid #f0c040; border-radius: 18px;
    padding: 28px 38px; text-align: center; z-index: 200;
  }
  #winOverlay h2 { font-size: 1.9em; color: #f0c040; margin-bottom: 12px; }
  #winOverlay p { font-size: 1em; color: #ccc; margin-bottom: 18px; }
  #winRestartBtn { background: linear-gradient(135deg, #f0c040, #e08020); color: #1a1a2e; }
  #scores {
    display: flex; gap: 30px; margin-bottom: 8px;
  }
  .score-box {
    background: rgba(255,255,255,0.1); border-radius: 12px;
    padding: 6px 18px; text-align: center; font-size: 0.95em;
  }
  .score-box span { display: block; font-size: 1.3em; font-weight: bold; }
  /* AI thinking indicator */
  #aiThinking {
    display: none; font-size: 0.9em; color: #aaddff;
    margin-top: 4px; animation: pulse 0.8s infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
</style>
</head>
<body>
<h1>🔴 跳棋 🤖</h1>
<div id="status">你的回合（红方）</div>
<div id="aiThinking">🤖 电脑思考中...</div>
<div id="scores">
  <div class="score-box" id="redScore" style="border:2px solid #ff6666;">你（红方） <span id="redCount">12</span></div>
  <div class="score-box" id="blueScore" style="border:2px solid #6699ff;">电脑（蓝方） <span id="blueCount">12</span></div>
</div>
<div id="gameContainer">
  <canvas id="board"></canvas>
  <div id="winOverlay">
    <h2 id="winMsg">🎉 你赢了！</h2>
    <p id="winSub">恭喜击败电脑！</p>
    <button id="winRestartBtn">再来一局</button>
  </div>
  <div class="btn-row">
    <button id="restartBtn">🔄 重新开始</button>
    <button id="diffBtn">⚡ 普通难度</button>
  </div>
  <div id="modeLabel">人机对战 — 你执红棋先行</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // 8x8 checkerboard — player=red(bottom), AI=blue(top)
  var GRID = 8, CELL = 60, PAD = 10;
  var SIZE = PAD * 2 + CELL * GRID;
  var canvas = document.getElementById('board');
  canvas.width = SIZE; canvas.height = SIZE;
  var ctx = canvas.getContext('2d');

  var statusDiv = document.getElementById('status');
  var aiThinkingDiv = document.getElementById('aiThinking');
  var winOverlay = document.getElementById('winOverlay');
  var winMsg = document.getElementById('winMsg');
  var winSub = document.getElementById('winSub');
  var modeLabel = document.getElementById('modeLabel');
  var redCountEl = document.getElementById('redCount');
  var blueCountEl = document.getElementById('blueCount');
  var diffBtn = document.getElementById('diffBtn');

  // difficulty: 0=easy, 1=normal, 2=hard
  var difficulty = 1;
  var diffNames = ['😊 简单难度', '⚡ 普通难度', '💀 困难难度'];

  // board[r][c]: 0=empty,1=red,2=blue,3=red king,4=blue king
  var board, currentPlayer, selected, gameOver, mustCapture, aiLocked;

  function initBoard() {
    board = [];
    for (var r = 0; r < GRID; r++) {
      board[r] = [];
      for (var c = 0; c < GRID; c++) board[r][c] = 0;
    }
    // Blue (AI) top rows 0-2, Red (player) bottom rows 5-7, dark squares only (r+c odd)
    for (var r = 0; r < 3; r++)
      for (var c = 0; c < GRID; c++)
        if ((r + c) % 2 === 1) board[r][c] = 2;
    for (var r = 5; r < GRID; r++)
      for (var c = 0; c < GRID; c++)
        if ((r + c) % 2 === 1) board[r][c] = 1;
    currentPlayer = 1; selected = null; gameOver = false;
    mustCapture = null; aiLocked = false;
    winOverlay.style.display = 'none';
    aiThinkingDiv.style.display = 'none';
    updateCounts(); updateStatus(); drawBoard();
  }

  function updateCounts() {
    var r1 = 0, r2 = 0;
    for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
      if (board[r][c] === 1 || board[r][c] === 3) r1++;
      if (board[r][c] === 2 || board[r][c] === 4) r2++;
    }
    redCountEl.textContent = r1; blueCountEl.textContent = r2;
    return { red: r1, blue: r2 };
  }

  function updateStatus() {
    if (gameOver) return;
    if (currentPlayer === 1) {
      statusDiv.textContent = '🔴 你的回合（红方）';
      aiThinkingDiv.style.display = 'none';
    } else {
      statusDiv.textContent = '🤖 电脑回合（蓝方）';
      aiThinkingDiv.style.display = 'block';
    }
  }

  // Get moves for a piece; captureOnly=true returns only captures
  function getMoves(r, c, captureOnly) {
    var p = board[r][c]; if (!p) return [];
    var isKing = (p === 3 || p === 4);
    var isRed = (p === 1 || p === 3);
    var dirs = isKing ? [[-1,-1],[-1,1],[1,-1],[1,1]]
                      : (isRed ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]]);
    var enemy = isRed ? [2, 4] : [1, 3];
    var moves = [];
    dirs.forEach(function(d) {
      var nr = r + d[0], nc = c + d[1];
      if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) return;
      if (enemy.indexOf(board[nr][nc]) !== -1) {
        var jr = nr + d[0], jc = nc + d[1];
        if (jr >= 0 && jr < GRID && jc >= 0 && jc < GRID && board[jr][jc] === 0)
          moves.push({ r: jr, c: jc, cap: [nr, nc], type: 'capture' });
      } else if (!captureOnly && board[nr][nc] === 0) {
        moves.push({ r: nr, c: nc, cap: null, type: 'move' });
      }
    });
    return moves;
  }

  // All capture moves for a given player
  function getAllCaptures(player) {
    var caps = [];
    for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
      var p = board[r][c];
      if ((player === 1 && (p === 1 || p === 3)) || (player === 2 && (p === 2 || p === 4))) {
        getMoves(r, c, true).forEach(function(m) { caps.push({ from: [r, c], move: m }); });
      }
    }
    return caps;
  }

  function drawBoard() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#f0d9a0' : '#8b5a2b';
      ctx.fillRect(PAD + c * CELL, PAD + r * CELL, CELL, CELL);
    }
    // Highlight selected square and valid move targets
    if (selected && currentPlayer === 1) {
      var sr = selected[0], sc = selected[1];
      ctx.fillStyle = 'rgba(255,255,0,0.35)';
      ctx.fillRect(PAD + sc * CELL, PAD + sr * CELL, CELL, CELL);
      var hasCaptures = getAllCaptures(1).length > 0;
      getMoves(sr, sc, hasCaptures).forEach(function(m) {
        ctx.fillStyle = 'rgba(100,255,100,0.38)';
        ctx.fillRect(PAD + m.c * CELL, PAD + m.r * CELL, CELL, CELL);
      });
    }
    ctx.strokeStyle = '#7a4a00'; ctx.lineWidth = 2;
    ctx.strokeRect(PAD, PAD, GRID * CELL, GRID * CELL);
    for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++)
      if (board[r][c]) drawPiece(r, c, board[r][c]);
  }

  function drawPiece(r, c, p) {
    var x = PAD + c * CELL + CELL / 2, y = PAD + r * CELL + CELL / 2;
    var rad = CELL * 0.38;
    var isRed = (p === 1 || p === 3), isKing = (p === 3 || p === 4);
    ctx.beginPath(); ctx.arc(x + 2, y + 3, rad, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fill();
    var g = ctx.createRadialGradient(x - rad * 0.3, y - rad * 0.3, rad * 0.1, x, y, rad);
    if (isRed) { g.addColorStop(0, '#ff9999'); g.addColorStop(1, '#cc0000'); }
    else { g.addColorStop(0, '#99bbff'); g.addColorStop(1, '#0044cc'); }
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = isRed ? '#880000' : '#002288'; ctx.lineWidth = 2; ctx.stroke();
    if (isKing) {
      ctx.fillStyle = '#ffd700'; ctx.font = 'bold ' + (CELL * 0.35) + 'px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('♛', x, y + 1);
    }
  }

  // Player click handler — only active on player's turn
  canvas.addEventListener('click', function(e) {
    if (gameOver || currentPlayer !== 1 || aiLocked) return;
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    var my = (e.clientY - rect.top) * (canvas.height / rect.height);
    var c = Math.floor((mx - PAD) / CELL), r = Math.floor((my - PAD) / CELL);
    if (r < 0 || r >= GRID || c < 0 || c >= GRID) return;
    handleClick(r, c);
  });

  function handleClick(r, c) {
    var p = board[r][c];
    var isMyPiece = (p === 1 || p === 3);
    var hasCaptures = getAllCaptures(1).length > 0;

    // Forced continuation capture
    if (mustCapture) {
      if (r === mustCapture[0] && c === mustCapture[1]) { selected = mustCapture; drawBoard(); return; }
      if (selected) {
        var mv = getMoves(selected[0], selected[1], true).find(function(m) { return m.r === r && m.c === c; });
        if (mv) { doMove(selected, mv); return; }
      }
      selected = mustCapture; drawBoard(); return;
    }

    if (isMyPiece) {
      if (hasCaptures && getMoves(r, c, true).length === 0) { selected = null; drawBoard(); return; }
      selected = [r, c]; drawBoard(); return;
    }
    if (!selected) return;
    var moves = getMoves(selected[0], selected[1], hasCaptures);
    var mv = moves.find(function(m) { return m.r === r && m.c === c; });
    if (mv) doMove(selected, mv);
    else { selected = null; drawBoard(); }
  }

  function doMove(from, mv) {
    var p = board[from[0]][from[1]];
    board[mv.r][mv.c] = p;
    board[from[0]][from[1]] = 0;
    if (mv.cap) board[mv.cap[0]][mv.cap[1]] = 0;
    // Promotion to king
    if (p === 1 && mv.r === 0) board[mv.r][mv.c] = 3;
    if (p === 2 && mv.r === GRID - 1) board[mv.r][mv.c] = 4;
    var promoted = (p === 1 && mv.r === 0) || (p === 2 && mv.r === GRID - 1);
    selected = null; mustCapture = null;

    // Check multi-capture (only if not just promoted)
    if (mv.cap && !promoted) {
      var more = getMoves(mv.r, mv.c, true);
      if (more.length > 0) {
        mustCapture = [mv.r, mv.c]; selected = [mv.r, mv.c];
        updateCounts(); drawBoard();
        if (currentPlayer === 2) { setTimeout(aiContinue, 500); }
        return;
      }
    }

    var counts = updateCounts();
    if (counts.red === 0) { endGame(2); return; }
    if (counts.blue === 0) { endGame(1); return; }

    // Switch turn
    currentPlayer = currentPlayer === 1 ? 2 : 1;

    // Check if next player has any moves at all
    var allMoves = [];
    for (var r2 = 0; r2 < GRID; r2++) for (var c2 = 0; c2 < GRID; c2++) {
      var pp = board[r2][c2];
      if ((currentPlayer === 1 && (pp === 1 || pp === 3)) ||
          (currentPlayer === 2 && (pp === 2 || pp === 4)))
        allMoves = allMoves.concat(getMoves(r2, c2, false));
    }
    if (allMoves.length === 0) { endGame(currentPlayer === 1 ? 2 : 1); return; }

    updateStatus(); drawBoard();
    if (currentPlayer === 2) { aiLocked = true; setTimeout(aiTurn, 600); }
    else { aiLocked = false; }
  }

  // AI continues a multi-capture chain
  function aiContinue() {
    if (gameOver || currentPlayer !== 2) return;
    var moves = getMoves(mustCapture[0], mustCapture[1], true);
    if (moves.length === 0) {
      mustCapture = null; selected = null;
      currentPlayer = 1; aiLocked = false;
      updateStatus(); drawBoard(); return;
    }
    var mv = pickAIMove(mustCapture, moves);
    doMove(mustCapture, mv);
  }

  function endGame(winner) {
    gameOver = true; aiLocked = false;
    aiThinkingDiv.style.display = 'none';
    if (winner === 1) {
      winMsg.textContent = '🎉 你赢了！';
      winSub.textContent = '太厉害了，你击败了电脑！';
      statusDiv.textContent = '🏆 你获胜！';
    } else {
      winMsg.textContent = '🤖 电脑赢了！';
      winSub.textContent = '别灰心，再挑战一次吧！';
      statusDiv.textContent = '😅 电脑获胜！';
    }
    setTimeout(function() { winOverlay.style.display = 'block'; }, 400);
  }

  // ── AI Logic ──────────────────────────────────────────────────────────────

  // Simple board evaluation: positive = good for AI (blue)
  function evaluate() {
    var score = 0;
    for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
      var p = board[r][c];
      if (p === 2) score += 10 + r;           // blue man, prefer advancing
      else if (p === 4) score += 18;           // blue king
      else if (p === 1) score -= 10 + (GRID - 1 - r);
      else if (p === 3) score -= 18;
    }
    return score;
  }

  // Get all moves for a player as {from, mv} pairs
  function getAllMoves(player) {
    var caps = getAllCaptures(player);
    if (caps.length > 0) return caps;
    var moves = [];
    for (var r = 0; r < GRID; r++) for (var c = 0; c < GRID; c++) {
      var p = board[r][c];
      if ((player === 1 && (p === 1 || p === 3)) || (player === 2 && (p === 2 || p === 4))) {
        getMoves(r, c, false).forEach(function(m) { moves.push({ from: [r, c], move: m }); });
      }
    }
    return moves;
  }

  // Mini-max with alpha-beta pruning (depth depends on difficulty)
  function minimax(depth, alpha, beta, maximizing) {
    if (depth === 0) return evaluate();
    var player = maximizing ? 2 : 1;
    var moves = getAllMoves(player);
    if (moves.length === 0) return maximizing ? -100 : 100;
    if (maximizing) {
      var best = -9999;
      for (var i = 0; i < moves.length; i++) {
        var m = moves[i];
        var saved = applyMove(m.from, m.move);
        var val = minimax(depth - 1, alpha, beta, false);
        undoMove(m.from, m.move, saved);
        if (val > best) best = val;
        if (best > alpha) alpha = best;
        if (beta <= alpha) break;
      }
      return best;
    } else {
      var best = 9999;
      for (var i = 0; i < moves.length; i++) {
        var m = moves[i];
        var saved = applyMove(m.from, m.move);
        var val = minimax(depth - 1, alpha, beta, true);
        undoMove(m.from, m.move, saved);
        if (val < best) best = val;
        if (best < beta) beta = best;
        if (beta <= alpha) break;
      }
      return best;
    }
  }

  function applyMove(from, mv) {
    var saved = { fromVal: board[from[0]][from[1]], toVal: board[mv.r][mv.c], capVal: mv.cap ? board[mv.cap[0]][mv.cap[1]] : null };
    var p = board[from[0]][from[1]];
    board[mv.r][mv.c] = p;
    board[from[0]][from[1]] = 0;
    if (mv.cap) board[mv.cap[0]][mv.cap[1]] = 0;
    if (p === 2 && mv.r === GRID - 1) board[mv.r][mv.c] = 4;
    if (p === 1 && mv.r === 0) board[mv.r][mv.c] = 3;
    return saved;
  }

  function undoMove(from, mv, saved) {
    board[from[0]][from[1]] = saved.fromVal;
    board[mv.r][mv.c] = saved.toVal;
    if (mv.cap) board[mv.cap[0]][mv.cap[1]] = saved.capVal;
  }

  // Pick best AI move from a list (used for multi-capture continuation too)
  function pickAIMove(from, moves) {
    if (difficulty === 0) {
      // Easy: random move
      return moves[Math.floor(Math.random() * moves.length)];
    }
    // Normal/Hard: use minimax
    var depth = difficulty === 2 ? 5 : 3;
    var bestVal = -9999, bestMv = moves[0];
    for (var i = 0; i < moves.length; i++) {
      var saved = applyMove(from, moves[i]);
      var val = minimax(depth - 1, -9999, 9999, false);
      undoMove(from, moves[i], saved);
      if (val > bestVal) { bestVal = val; bestMv = moves[i]; }
    }
    return bestMv;
  }

  function aiTurn() {
    if (gameOver || currentPlayer !== 2) { aiLocked = false; return; }
    var allM = getAllMoves(2);
    if (allM.length === 0) { aiLocked = false; return; }
    // Group by from position then pick best overall
    var bestVal = -9999, bestEntry = allM[0];
    var depth = difficulty === 2 ? 5 : (difficulty === 1 ? 3 : 1);
    for (var i = 0; i < allM.length; i++) {
      var entry = allM[i];
      var saved = applyMove(entry.from, entry.move);
      var val = minimax(depth - 1, -9999, 9999, false);
      undoMove(entry.from, entry.move, saved);
      if (difficulty === 0) val += Math.random() * 8 - 4; // add noise for easy
      if (val > bestVal) { bestVal = val; bestEntry = entry; }
    }
    doMove(bestEntry.from, bestEntry.move);
  }

  // ── Buttons ───────────────────────────────────────────────────────────────

  var restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', function() { initBoard(); });

  if (diffBtn) diffBtn.addEventListener('click', function() {
    difficulty = (difficulty + 1) % 3;
    diffBtn.textContent = diffNames[difficulty];
    initBoard();
  });

  var winRestartBtn = document.getElementById('winRestartBtn');
  if (winRestartBtn) winRestartBtn.addEventListener('click', function() { initBoard(); });

  initBoard();

  // BUTTON CHECKLIST: #restartBtn ✓  #diffBtn ✓  #winRestartBtn ✓
});
</script>
</body>
</html>
